<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AUXILIO MYSTIC</title>

<style>
body {
    margin: 0;
    background: #050505;
    font-family: Arial;
    color: white;
}

/* LOGIN */
.login {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.login-box {
    background: #0a0a0a;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 0 25px #a020f0;
    text-align: center;
}

.login-box h2 {
    color: #d580ff;
}

input {
    padding: 10px;
    margin-top: 10px;
    width: 100%;
    border: none;
    border-radius: 8px;
}

button {
    margin-top: 10px;
    padding: 10px;
    width: 100%;
    background: transparent;
    border: 1px solid #a020f0;
    color: #d580ff;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    background: #a020f0;
    color: black;
}

/* PAINEL */
.painel {
    display: none;
    width: 90%;
    max-width: 400px;
    margin: 50px auto;
    padding: 20px;
    border-radius: 15px;
    background: #0a0a0a;
    box-shadow: 0 0 25px #a020f0;
}

.titulo {
    text-align: center;
    color: #d580ff;
    margin-bottom: 20px;
}

.box {
    border: 1px solid #a020f0;
    border-radius: 10px;
    padding: 15px;
    margin-bottom: 15px;
    box-shadow: 0 0 10px #a020f0;
}

.label {
    display: flex;
    justify-content: space-between;
    margin: 10px 0;
}

#codigos {
    display: none;
    height: 120px;
    overflow: auto;
    font-size: 12px;
    color: #00ff00;
    background: black;
    padding: 10px;
    margin-top: 10px;
    border-radius: 8px;
}

#mensagem {
    text-align: center;
    margin-top: 15px;
    color: #00ffcc;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login" id="loginTela">
    <div class="login-box">
        <h2>AUXILIO MYSTIC</h2>
        <input type="password" id="senha" placeholder="Digite a senha">
        <button onclick="logar()">ENTRAR</button>
        <p id="erro" style="color:red;"></p>
    </div>
</div>

<!-- PAINEL -->
<div class="painel" id="painel">

    <div class="titulo">AUXILIO MYSTIC</div>

    <div class="box">
        <b>Funções (AUXÍLIO):</b>

        <div class="label">AIMFOV <input type="checkbox"></div>
        <div class="label">AIMBOT <input type="checkbox"></div>
        <div class="label">HS 70% <input type="checkbox"></div>

        <div class="label">FOV: <span id="fovValor">0</span>px</div>
        <input type="range" min="0" max="100" oninput="atualizarFov(this.value)">
    </div>

    <div class="box">
        <button onclick="mostrarCodigos()">CÓDIGOS XIT IA</button>
        <button onclick="injetar()">INJETAR</button>
        <button onclick="info()">INFORMAÇÕES</button>

        <div id="codigos"></div>
        <div id="mensagem"></div>
    </div>

    <div class="box">
        <b>LOJA MYSTIC STORE</b>
    </div>

</div>

<script>
function logar(){
    let senha = document.getElementById("senha").value;

    if(senha === "MDZ123"){
        document.getElementById("loginTela").style.display = "none";
        document.getElementById("painel").style.display = "block";
    } else {
        document.getElementById("erro").innerText = "Senha incorreta!";
    }
}

function atualizarFov(valor){
    document.getElementById("fovValor").innerText = valor;
}

function gerarCodigo(){
    let chars = "01ABCDEF";
    let codigo = "";
    for(let i=0;i<25;i++){
        codigo += chars[Math.floor(Math.random()*chars.length)];
    }
    return codigo;
}

function mostrarCodigos(){
    let box = document.getElementById("codigos");
    box.style.display = "block";
    box.innerHTML = "";

    let intervalo = setInterval(()=>{
        let linha = document.createElement("div");
        linha.textContent = gerarCodigo();
        box.appendChild(linha);
    },100);

    setTimeout(()=>{
        clearInterval(intervalo);
        box.style.display = "none";
    },25000);
}

function injetar(){
    document.getElementById("mensagem").innerText = "ARQUIVOS INJETADOS";
}

function info(){
    document.getElementById("mensagem").innerText = "FEITO POR MDZ";
}
</script>

</body>
</html>
